name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            npm_pkg: core-linux-x64
            bin: crewforge
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            npm_pkg: core-linux-arm64
            bin: crewforge
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_pkg: core-darwin-x64
            bin: crewforge
          - os: macos-latest
            target: aarch64-apple-darwin
            npm_pkg: core-darwin-arm64
            bin: crewforge

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crewforge-rs -> crewforge-rs/target"

      - name: Install cross (for Linux musl targets)
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crewforge-rs/Cargo.toml

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} --manifest-path crewforge-rs/Cargo.toml

      - name: Copy binary into platform package
        shell: bash
        run: |
          bin_path="crewforge-rs/target/${{ matrix.target }}/release/${{ matrix.bin }}"
          cp "$bin_path" "crewforge-rs/npm/crewforge-${{ matrix.npm_pkg }}/${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: crewforge-rs/npm/crewforge-${{ matrix.npm_pkg }}/

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts/

      - name: Restore binaries and fix permissions
        shell: bash
        run: |
          for dir in npm-artifacts/*/; do
            pkg=$(basename "$dir")
            cp -r "$dir"* "crewforge-rs/npm/crewforge-$pkg/"
          done
          chmod +x crewforge-rs/npm/crewforge-core-linux-x64/crewforge \
                   crewforge-rs/npm/crewforge-core-linux-arm64/crewforge \
                   crewforge-rs/npm/crewforge-core-darwin-x64/crewforge \
                   crewforge-rs/npm/crewforge-core-darwin-arm64/crewforge

      - name: Set version & publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core-linux-x64 core-linux-arm64 core-darwin-x64 core-darwin-arm64; do
            pkg_dir="crewforge-rs/npm/crewforge-$pkg"
            (
              cd "$pkg_dir"
              npm version "$VERSION" --no-git-tag-version --allow-same-version
              npm publish --access public
            )
          done

      - name: Set version & publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci --prefix crewforge-ts
          npm run build --prefix crewforge-ts
          node -e "
            const fs = require('fs');
            const pkgPath = 'crewforge-ts/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            Object.keys(pkg.optionalDependencies || {}).forEach((k) => {
              pkg.optionalDependencies[k] = process.env.VERSION;
            });
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix crewforge-ts
          npm publish --access public --prefix crewforge-ts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping creation."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
